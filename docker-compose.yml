services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: momenthub_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:stable-alpine
    container_name: momenthub_nginx
    ports:
      - "8070:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    platform: ${MYSQL_PLATFORM:-linux/arm64/v8}
    container_name: momenthub_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: momenthub
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3322:3306"
    volumes:
      - momenthub_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: ${PHPMYADMIN_PLATFORM:-linux/amd64}
    container_name: momenthub_phpmyadmin
    restart: unless-stopped
    ports:
      - "8075:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql

  redis:
    image: redis:7-alpine
    container_name: momenthub_redis
    ports:
      - "6371:6375"

volumes:
  momenthub_mysql_data:
